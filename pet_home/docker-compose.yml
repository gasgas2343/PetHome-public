version: '3.8'

services:
  redis-shop:
    image: redis:7-alpine
    container_name: redis-shop
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass Sh0p2026_R3d!sPwd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Sh0p2026_R3d!sPwd", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
    driver: local