spring.application.name=pet_home

# data base
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=pethome;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
# 這裡抽成變數，本機沒有設定時會改用預設值，但為了安全，我們把它交給環境變數
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=600
jwt.refresh-token-expiration=604800

# totp
app.crypto.aes-secret-key=${AES_SECRET_KEY}

# jackson
spring.jackson.time-zone=Asia/Taipei
spring.jackson.date-format=yyyy-MM-dd
server.servlet.context-path=/api

# Mail
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# log format
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# Redis 連線
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms

# 連線池
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# 綠界 ECPay 設定（測試環境）
ecpay.merchant-id=${ECPAY_MERCHANT_ID:3002607}
ecpay.hash-key=${ECPAY_HASH_KEY}
ecpay.hash-iv=${ECPAY_HASH_IV}
ecpay.action-url=https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5
ecpay.return-url=${ECPAY_RETURN_URL:https://buckshot-fiddling-endowment.ngrok-free.dev/api/payments/ecpay/notify}
ecpay.client-back-url=${ECPAY_CLIENT_BACK_URL:http://localhost:5173/shop/member?tab=orders}

spring.jpa.hibernate.naming.physical-strategy=com.system.config.PetHomePhysicalNamingStrategy

# Backend URL
app.backend-base-url=${BACKEND_BASE_URL:http://localhost:8080/api}

# LINE Pay sandbox
wash.line-pay.api-base-url=${LINE_PAY_API_BASE_URL:https://sandbox-api-pay.line.me}
wash.line-pay.channel-id=${LINE_PAY_CHANNEL_ID:2010528000}
wash.line-pay.channel-secret=${LINE_PAY_CHANNEL_SECRET}
wash.line-pay.currency=${LINE_PAY_CURRENCY:TWD}
wash.line-pay.confirm-url=${LINE_PAY_CONFIRM_URL:${app.backend-base-url}/pay/confirm}
wash.line-pay.cancel-url=${LINE_PAY_CANCEL_URL:${app.frontend-base-url}/wash/payment}
